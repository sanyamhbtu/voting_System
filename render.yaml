# Render.com blueprint — one-click free-tier deploy of VoteChain.
# Docs: https://render.com/docs/blueprint-spec
# Set the `sync: false` secrets in the Render dashboard after the first deploy.
services:
  # ── Backend (Node + Python, via Docker) ─────────────────────────────
  - type: web
    name: votechain-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "3000"
      - key: JWT_SECRET_KEY
        generateValue: true        # Render generates a strong random secret
      - key: FRONTEND_URL
        sync: false                # e.g. https://votechain-frontend.onrender.com
      - key: MONOGDB_URL
        sync: false                # MongoDB Atlas connection string
      - key: RPC_URL
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false
      - key: META_PRIVATE_KEY
        sync: false
      - key: MNEOMONIC
        sync: false
      - key: GCP_CREDENTIALS_JSON
        sync: false                # paste the full service-account JSON
      - key: GCS_BUCKET
        sync: false

  # ── Frontend (Vite static site) ─────────────────────────────────────
  - type: web
    name: votechain-frontend
    runtime: static
    buildCommand: cd Frontend && npm install && npm run build
    staticPublishPath: ./Frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false                # e.g. https://votechain-backend.onrender.com
      - key: VITE_WS_URL
        sync: false                # e.g. wss://votechain-backend.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
